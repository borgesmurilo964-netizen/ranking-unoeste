<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Ranking Unoeste</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#0f0f0f;color:#f5f0e6;font-family:Arial,sans-serif}main{max-width:1120px;margin:0 auto;padding:24px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}.title h1{margin:0;color:#d4a843;font-size:30px}.title p{margin:6px 0 0;color:#aaa}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:10px;padding:11px 16px;font-weight:800;cursor:pointer}.btn-gold{background:#d4a843;color:#111}.btn-orange{background:#f07828;color:#170e03}.btn-dark{background:#222;color:#eee;border:1px solid #444}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.card{background:#181818;border:1px solid #333;border-radius:14px;overflow:hidden}.card h2{margin:0;padding:16px 18px;border-bottom:1px solid #333}.pres h2{color:#d4a843}.ead h2{color:#f07828}.row{display:grid;grid-template-columns:42px 1fr 46px 82px 46px;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06)}.row:last-child{border-bottom:0}.rank{color:#999;font-weight:bold}.name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mini{width:42px;height:36px;border-radius:8px;border:1px solid #444;background:#242424;color:#fff;font-size:20px;font-weight:bold;cursor:pointer}.mini.plus{background:#14351f;border-color:#2f7d46}.mini.minus{background:#351414;border-color:#7d2f2f}.val{width:82px;background:#080808;color:#fff;border:1px solid #555;border-radius:8px;padding:9px;text-align:center;font-weight:bold;font-size:16px}.status{margin-top:14px;color:#aaa;min-height:22px}.ok{color:#7be495}.err{color:#ff8d8d}@media(max-width:800px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.row{grid-template-columns:34px 1fr 42px 72px 42px}main{padding:14px}}
</style>
</head>
<body>
<main>
  <div class="top">
    <div class="title"><h1>Admin — Ranking Unoeste</h1><p>Atualize as matrículas. A TV atualiza automaticamente em alguns segundos.</p></div>
    <div class="actions"><button class="btn btn-dark" onclick="carregar()">Recarregar</button><button class="btn btn-gold" onclick="salvarTudo()">Salvar alterações</button></div>
  </div>
  <div class="grid">
    <section class="card pres"><h2>🏆 Presencial</h2><div id="presencial"></div></section>
    <section class="card ead"><h2>🎓 EAD / Semipresencial</h2><div id="ead"></div></section>
  </div>
  <div id="status" class="status">Carregando...</div>
</main>
<script>
const SUPABASE_URL = "https://dckgbwmbasqfnpnfrddm.supabase.co";
const SUPABASE_KEY = "sb_publishable_IdbBp9OYHL_fj0lLm4wM5A_ooSjOey1";
let dados = [];
function st(msg,cls=''){const el=document.getElementById('status');el.className='status '+cls;el.textContent=msg;}
async function api(path,opt={}){const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{...opt,headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',Prefer:'return=representation',...(opt.headers||{})}});if(!r.ok)throw new Error(await r.text());return r.status===204?null:r.json();}
async function carregar(){try{st('Carregando dados...');dados=await api('ranking?select=id,nome,valor,tipo,ordem,ativo&ativo=eq.true&order=tipo.asc,ordem.asc');render('presencial');render('ead');st('Dados carregados. Faça as alterações e clique em Salvar.','ok')}catch(e){console.error(e);st('Erro ao carregar: '+e.message,'err')}}
function render(tipo){const box=document.getElementById(tipo);const arr=dados.filter(x=>x.tipo===tipo).sort((a,b)=>a.ordem-b.ordem);box.innerHTML=arr.map((c,i)=>`<div class="row" data-id="${c.id}"><div class="rank">${i+1}º</div><div class="name">${c.nome}</div><button class="mini minus" onclick="inc(${c.id},-1)">−</button><input class="val" type="number" min="0" value="${c.valor}" onchange="setv(${c.id},this.value)"><button class="mini plus" onclick="inc(${c.id},1)">+</button></div>`).join('')}
function setv(id,v){const c=dados.find(x=>x.id===id);if(c)c.valor=Math.max(0,parseInt(v,10)||0)}
function inc(id,n){const c=dados.find(x=>x.id===id);if(!c)return;c.valor=Math.max(0,(parseInt(c.valor,10)||0)+n);render(c.tipo)}
async function salvarTudo(){try{st('Salvando...');for(const c of dados){await api('ranking?id=eq.'+c.id,{method:'PATCH',body:JSON.stringify({valor:parseInt(c.valor,10)||0})})}st('✅ Salvo! A TV deve atualizar em até 5 segundos.','ok')}catch(e){console.error(e);st('Erro ao salvar: '+e.message,'err')}}
carregar();
</script>
</body>
</html>
